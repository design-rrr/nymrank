<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NymRank API Docs</title>
  <link rel="icon" type="image/png" href="/public/nymrank_sm.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 20px; }
    .container { max-width: 960px; margin: 0 auto; }
    .top-nav { display: flex; gap: 10px; margin-bottom: 20px; }
    .nav-link { display: inline-block; padding: 8px 14px; border-radius: 6px; text-decoration: none; font-weight: 600; }
    .nav-link.back { background: #2a2a2a; color: #4CAF50; border: 1px solid #4CAF50; }
    .nav-link.faq { background: #4CAF50; color: #000; }
    h1 { margin-bottom: 8px; color: #fff; }
    p { color: #888; margin-bottom: 18px; }
    .card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 16px; margin: 16px 0; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
    input { background: #111; color: #e0e0e0; border: 1px solid #333; border-radius: 6px; padding: 10px; min-width: 240px; }
    button { background: #4CAF50; color: #000; border: none; border-radius: 6px; padding: 10px 14px; font-weight: 600; cursor: pointer; }
    button:hover { opacity: 0.95; }
    pre { background: #111; border: 1px solid #333; border-radius: 6px; padding: 12px; overflow: auto; color: #cfcfcf; }
    .endpoint { color: #4CAF50; font-family: 'Monaco', 'Courier New', monospace; }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-nav">
      <a class="nav-link back" href="/">Back to Rankings</a>
      <a class="nav-link faq" href="/faq">FAQ</a>
    </div>
    <h1>NymRank API</h1>
    <p>Interactive docs for hackathon integration testing.</p>

    <div class="card">
      <h2 class="endpoint">GET /api/names/:name</h2>
      <div class="row">
        <input id="nameLookup" value="alice" placeholder="name">
        <button onclick="runNameLookup()">Run</button>
      </div>
      <pre id="nameLookupResult">{}</pre>
    </div>

    <div class="card">
      <h2 class="endpoint">GET /api/names/:name/suggestions</h2>
      <div class="row">
        <input id="suggestName" value="alice" placeholder="name">
        <button onclick="runSuggestions()">Run</button>
      </div>
      <pre id="suggestResult">{}</pre>
    </div>

    <div class="card">
      <h2 class="endpoint">GET /api/users/:pubkey/rank</h2>
      <div class="row">
        <input id="pubkeyLookup" placeholder="hex pubkey or npub">
        <button onclick="runUserRank()">Run</button>
      </div>
      <pre id="pubkeyLookupResult">{}</pre>
    </div>

    <div class="card">
      <h2 class="endpoint">GET /api/status</h2>
      <div class="row">
        <button onclick="runStatus()">Run</button>
      </div>
      <pre id="statusResult">{}</pre>
    </div>
  </div>

  <script>
    async function fetchJson(url) {
      const response = await fetch(url);
      const data = await response.json().catch(() => ({ error: { code: 'invalid_json', message: 'Response was not JSON' } }));
      return { status: response.status, data };
    }

    function showResult(id, payload) {
      document.getElementById(id).textContent = JSON.stringify(payload, null, 2);
    }

    async function runNameLookup() {
      const name = document.getElementById('nameLookup').value.trim();
      const result = await fetchJson(`/api/names/${encodeURIComponent(name)}`);
      showResult('nameLookupResult', result);
    }

    async function runSuggestions() {
      const name = document.getElementById('suggestName').value.trim();
      const result = await fetchJson(`/api/names/${encodeURIComponent(name)}/suggestions`);
      showResult('suggestResult', result);
    }

    async function runUserRank() {
      const pubkey = document.getElementById('pubkeyLookup').value.trim();
      const result = await fetchJson(`/api/users/${encodeURIComponent(pubkey)}/rank`);
      showResult('pubkeyLookupResult', result);
    }

    async function runStatus() {
      const result = await fetchJson('/api/status');
      showResult('statusResult', result);
    }
  </script>
</body>
</html>
